services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      POSTGRES_HOST: postgres
    depends_on:
      - postgres
    volumes:
      - backend_media:/app/media
    networks:
      - app_network

  frontend-build:
    build:
      context: ./frontend
    command: sh -c "npm install && npm run build && cp -r dist/. /frontend-dist && tail -f /dev/null"
    environment:
      VITE_API_BASE_URL: /api
    volumes:
      - frontend_dist:/frontend-dist
    networks:
      - app_network

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend-build
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app_network

volumes:
  postgres_data:
  backend_media:
  frontend_dist:

networks:
  app_network:
    driver: bridge
